<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="icon" href="img/icon.png" type="image/x-icon">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="user-info">
                <h1>✦ Hola, {{ name }} !</h1>
                <div class="header-icons">
                    <span class="icon-cart"><img src="img/cart.svg" alt="Carrito"></span>
                    <img src="img/avatar_1.jpg" alt="Perfil" class="avatar">
                </div>
            </div>
            <input type="text" placeholder="Buscar productos..." class="search-bar">
            
            <nav class="categories d-flex justify-content-center flex-wrap gap-2 my-4">
                <button  class="cat-btn" >Productos</button>
                <button  class="cat-btn" >Skincare</button>
                <button  class="cat-btn" >Cabello</button>
                <button  class="cat-btn" >Cuerpo</button>
                <button  class="cat-btn" >Makeup</button>
            </nav>
        </header>

        <main class="container">
            <section class="banner">
                <div class="banner-content">
                    <h4>DATE UN MOMENTO DE RELAX</h4>
                    <h2>Hagamos el bienestar un ritual</h2>
                    <p>Una colección nacida del silencio, elaborada con precisión clínica y diseñada para devolverte a ti mismo.</p>
                    <button class="subscription">SUSCRIBETE</button>
                </div>
            </section>

            <div class="section-title">
                <h3>Productos</h3>
                <span>Ver todo</span>
            </div>
            

<!-- Productos -->
           <div class="row g-4"> 
                <div 
                v-for="(item, index) in productos" 
                :key="index" 
                class="col-6 col-md-4 col-lg-3">

                    <product-card 
                    :producto="item"
                    @fav="marcarFavorito"
                    @add="agregarAlCarrito"
                    ></product-card>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
